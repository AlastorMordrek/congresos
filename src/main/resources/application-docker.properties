
# Nombre de la aplicacion.
spring.application.name=${APP_NAME:congresos}



# Configuracion de base de datos.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:congresos}
spring.datasource.username=${DB_USR:admin}
spring.datasource.password=${DB_PWD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# Mostrar consultas de SQL.
spring.jpa.show-sql=false

# Cada que arranca el servidor, limpie la BD.
#spring.jpa.hibernate.ddl-auto=create-drop
# Cada que arranca el servidor, continua con la DB existente,
# de ser necesario, actualiza el schema.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.format_sql=false



# Configuracion de manejo de errores.

# Incluir mensaje de error en respuestas http.
server.error.include-message=always
# No incluir stacktrace en respuestas http.
server.error.include-stacktrace=never
# No exponer reglas de validacion internas (No estoy seguro de esta).
server.error.include-binding-errors=never
