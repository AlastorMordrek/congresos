services:
  postgres:
    image: postgres:17
    container_name: ${APP_NAME}_db
    environment:
      POSTGRES_USER: ${DB_USR}
      POSTGRES_PASSWORD: ${DB_PWD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - congresos_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - congresos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USR} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME}_app
    environment:
      - DB_HOST=${APP_NAME}_db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USR=${DB_USR}
      - DB_PWD=${DB_PWD}
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "${WEB_SERVER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - congresos_network
    volumes:
      - m2_cache:/root/.m2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  congresos_postgres_data:
  m2_cache:

networks:
  congresos_network:
    driver: bridge
